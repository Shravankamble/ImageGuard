apiVersion: v1
kind: Pod
metadata:
  name: my-pods1
spec:
  containers:
  - name: myapp
    image: ghcr.io/shravankamble/jwt-auth:v2
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 8000